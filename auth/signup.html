<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - LiveStream Pro</title>
    <link rel="stylesheet" href="styles.css">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
</head>

<body>
    <div class="container">
        <div class="auth-card">
            <h2>Create Account</h2>
            <p class="subtitle">Start your streaming journey today</p>

            <div id="errorMessage" class="error-message" style="display: none;"></div>
            <div id="successMessage" class="success-message" style="display: none;"></div>

            <form id="signupForm" autocomplete="off">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your full name"
                        autocomplete="name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email"
                        autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Choose a password"
                        autocomplete="new-password">
                </div>

                <div class="password-strength">
                    <div id="strengthBar" class="strength-bar"></div>
                </div>
                <div id="strengthText" class="strength-text"></div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required
                        placeholder="Confirm your password" autocomplete="new-password">
                </div>

                <button type="submit" class="btn" id="signupBtn">
                    <span id="btnText">Sign Up</span>
                    <span id="loadingSpinner" class="loading" style="display: none;"></span>
                </button>
            </form>

            <div class="auth-link">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </div>

    <!-- Load Firebase scripts ONCE - in correct order -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <!-- Your script -->
    <script src="script.js"></script>
</body>

</html>
